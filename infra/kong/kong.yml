        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: clinical-notes-search-service
    url: http://host.docker.internal:8004
    routes:
      - name: clinical-notes-search-route
        paths:
          - /mcp/clinical/clinical-notes-search/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true
          hide_client_headers: false

