_format_version: "3.0"
_transform: true

services:

  - name: vitals-trends-service
    url: http://host.docker.internal:8001
    routes:
      - name: vitals-trends-route
        paths:
          - /mcp/clinical/vitals-trends/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: labs-diagnoses-service
    url: http://host.docker.internal:8002
    routes:
      - name: labs-diagnoses-route
        paths:
          - /mcp/clinical/labs-diagnoses/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: medications-interactions-service
    url: http://host.docker.internal:8003
    routes:
      - name: medications-interactions-route
        paths:
          - /mcp/clinical/medications-interactions/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: clinical-notes-search-service
    url: http://host.docker.internal:8004
    routes:
      - name: clinical-notes-search-route
        paths:
          - /mcp/clinical/clinical-notes-search/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 30
          policy: local
          fault_tolerant: true
          hide_client_headers: false

plugins:
  - name: opentelemetry
    config:
      endpoint: http://jaeger:4317
      resource_attributes:
        service.name: kong-gateway

# NOTE: this RSA public key MUST match the static signing key pinned in
# infra/keycloak/realm-export.json (components.org.keycloak.keys.KeyProvider,
# name=rsa-static). Both were generated as one keypair so Keycloak's tokens
# validate here across every `down -v` / re-init. Regenerate BOTH together or
# neither — never just one.
consumers:
  - username: runtime-agent
    jwt_secrets:
      - key: http://localhost:8080/realms/patient-risk
        algorithm: RS256
        rsa_public_key: |
