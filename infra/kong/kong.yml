_format_version: "3.0"
_transform: true

services:

  - name: vitals-trends-service
    url: http://host.docker.internal:8001
    routes:
      - name: vitals-trends-route
        paths:
          - /mcp/clinical/vitals-trends/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: labs-diagnoses-service
    url: http://host.docker.internal:8002
    routes:
      - name: labs-diagnoses-route
        paths:
          - /mcp/clinical/labs-diagnoses/dev
        strip_path: true
    plugins:
      - name: request-transformer
        config:
          replace:
            uri: /mcp
      - name: jwt
        config:
          uri_param_names: []
          cookie_names: []
          key_claim_name: iss
          secret_is_base64: false
      - name: rate-limiting
        config:
          minute: 60
          policy: local
          fault_tolerant: true
          hide_client_headers: false

  - name: medications-interactions-service
    url: http://host.docker.internal:8003
