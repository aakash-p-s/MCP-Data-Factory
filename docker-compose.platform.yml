services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_DB: dev-file
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak_data:/opt/keycloak/data
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/realms/patient-risk"]
      interval: 15s
      timeout: 5s
      retries: 10

  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
    volumes:
      - ./infra/kong/kong.yml:/etc/kong/kong.yml
    ports:
      - "8000:8000"
      - "8101:8001"
    depends_on:
      keycloak:
        condition: service_started

  registry-db:
    image: postgres:16
    environment:
      POSTGRES_DB: registry
      POSTGRES_USER: registry_user
      POSTGRES_PASSWORD: registry_pass
    volumes:
      - registry_data:/var/lib/postgresql/data
      - ./infra/postgres/init-registry-db.sql:/docker-entrypoint-initdb.d/init-registry-db.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registry_user -d registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  registry-api:
    build: ./backend/registry
    environment:
      DATABASE_URL: postgresql+asyncpg://registry_user:registry_pass@registry-db:5432/registry
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/patient-risk/protocol/openid-connect/certs
      KEYCLOAK_AUDIENCE: patient-risk-agent
    ports:
      - "8600:8600"
    depends_on:
      registry-db:
        condition: service_healthy
      keycloak:
        condition: service_started

  agent:
    build: ./agent
    environment:
      KEYCLOAK_JWKS_URL: http://keycloak:8080/realms/patient-risk/protocol/openid-connect/certs
      VITALS_MCP_URL: http://kong:8000/mcp/clinical/vitals-trends/dev
      LABS_MCP_URL: http://kong:8000/mcp/clinical/labs-diagnoses/dev
      MEDS_MCP_URL: http://kong:8000/mcp/clinical/medications-interactions/dev
      NOTES_MCP_URL: http://kong:8000/mcp/clinical/clinical-notes-search/dev
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports:
      - "8500:8500"
    depends_on:
      - kong

  frontend:
    build: ./frontend
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      KEYCLOAK_CLIENT_ID: patient-risk-agent
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER: http://localhost:8080/realms/patient-risk
      NEXT_PUBLIC_AGENT_URL: http://localhost:8500
      NEXT_PUBLIC_REGISTRY_URL: http://localhost:8600
    ports:
      - "3000:3000"
    depends_on:
      - agent
      - registry-api

  pgadmin:
    image: dpage/pgadmin4:8.6
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"

  jaeger:
    image: jaegertracing/all-in-one:1.57
    ports:
      - "16686:16686"
      - "4317:4317"

volumes:
  registry_data:
  keycloak_data: